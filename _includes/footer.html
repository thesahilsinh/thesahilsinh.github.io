<!-- =============== NVIDIA RAG Chat Widget (Sahilsinh) =============== -->
<div id="chat-widget" class="fixed bottom-6 right-6 z-50">
  <!-- Floating Button -->
  <button onclick="toggleChat()" 
    class="bg-[#00cc99] hover:bg-[#00b388] text-black font-bold px-6 py-3.5 rounded-2xl shadow-2xl flex items-center gap-3 transition-all text-base">
    <span class="text-xl">💬</span>
    <span>Ask me anything (Resume • PMA Labs • Forensics)</span>
  </button>

  <!-- Chat Window -->
  <div id="chat-window" class="hidden mt-3 w-96 bg-zinc-900 border border-zinc-700 rounded-3xl shadow-2xl overflow-hidden">
    <!-- Header -->
    <div class="bg-zinc-800 px-5 py-4 flex items-center justify-between border-b border-zinc-700">
      <div class="flex items-center gap-3">
        <img src="/assets/img/avatar.jpg" class="w-9 h-9 rounded-full ring-2 ring-[#00cc99]" alt="Sahilsinh">
        <div>
          <p class="font-bold text-white text-lg">Sahilsinh's Assistant</p>
          <p class="text-xs text-zinc-400">Powered by NVIDIA Llama 3.1 • Grounded in my resume & labs</p>
        </div>
      </div>
      <button onclick="toggleChat()" class="text-2xl text-zinc-400 hover:text-white">✕</button>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="h-96 p-5 overflow-y-auto bg-zinc-950 text-sm space-y-4 scroll-smooth">
      <!-- Messages will appear here -->
    </div>

    <!-- Input Area -->
    <div class="p-4 border-t border-zinc-700 bg-zinc-900">
      <div class="flex gap-2">
        <input id="chat-input" 
               type="text" 
               placeholder="E.g. Tell me about your Drone Forensics Tool" 
               class="flex-1 bg-zinc-800 border border-zinc-700 focus:border-[#00cc99] text-white placeholder-zinc-400 rounded-2xl px-5 py-3 focus:outline-none">
        <button onclick="sendMessage()" 
                class="bg-[#00cc99] hover:bg-[#00b388] text-black px-7 rounded-2xl font-bold">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
  const apiUrl = "https://nvidia-rag-chatbox.onrender.com/chat";

  function toggleChat() {
    document.getElementById("chat-window").classList.toggle("hidden");
  }

  async function sendMessage() {
    const input = document.getElementById("chat-input");
    const message = input.value.trim();
    if (!message) return;

    addMessage("user", message);
    input.value = "";

    const loadingMsg = addMessage("bot", "Thinking with my resume & labs...");

    try {
      const res = await fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message })
      });

      const data = await res.json();
      loadingMsg.remove();
      addMessage("bot", data.response || data.answer || "Sorry, I couldn't process that.");
    } catch (err) {
      loadingMsg.remove();
      addMessage("bot", "⚠️ Backend is still waking up. Try again in 30 seconds or check Render logs.");
    }
  }

  function addMessage(sender, text) {
    const container = document.getElementById("chat-messages");
    const div = document.createElement("div");
    div.className = sender === "user" ? "text-right" : "text-left";
    div.innerHTML = `
      <div class="${sender === "user" 
        ? 'bg-[#00cc99] text-black ml-auto' 
        : 'bg-zinc-800 text-white'} max-w-[85%] px-4 py-3 rounded-3xl inline-block">
        ${text}
      </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  // Enter key support
  document.getElementById("chat-input").addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
  });
</script>
